// ---------- Modo Laberinto (con monstruos) ----------
function mazeCenter(cx, cy) {
  return { x: mazeOffX + cx * mazeTile + mazeTile / 2, y: mazeOffY + cy * mazeTile + mazeTile / 2 };
}
function mazeWall(cx, cy) {
  if (cy < 0 || cy >= mazeRows || cx < 0 || cx >= mazeCols) return true;
  return mazeGrid[cy][cx] === '#';
}
function shuffleArr(a) {
  for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
  return a;
}
function randDir() {
  const d = [[1, 0], [-1, 0], [0, 1], [0, -1]][Math.floor(Math.random() * 4)];
  return { x: d[0], y: d[1] };
}
// genera un laberinto "perfecto" con backtracking iterativo
function genMaze(cols, rows) {
  const g = Array.from({ length: rows }, () => Array(cols).fill('#'));
  const stack = [[1, 1]]; g[1][1] = ' ';
  while (stack.length) {
    const [cx, cy] = stack[stack.length - 1];
    const dirs = shuffleArr([[2, 0], [-2, 0], [0, 2], [0, -2]]);
    let moved = false;
    for (const [dx, dy] of dirs) {
      const nx = cx + dx, ny = cy + dy;
      if (nx > 0 && nx < cols - 1 && ny > 0 && ny < rows - 1 && g[ny][nx] === '#') {
        g[cy + dy / 2][cx + dx / 2] = ' '; g[ny][nx] = ' ';
        stack.push([nx, ny]); moved = true; break;
      }
    }
    if (!moved) stack.pop();
  }
  return g;
}
// colisión: ¿alguna esquina de la caja (x,y,half) cae en pared?
function mazeBlocked(x, y, half) {
  const pts = [[x - half, y - half], [x + half, y - half], [x - half, y + half], [x + half, y + half]];
  for (const [px, py] of pts) {
    const cx = Math.floor((px - mazeOffX) / mazeTile);
    const cy = Math.floor((py - mazeOffY) / mazeTile);
    if (mazeWall(cx, cy)) return true;
  }
  return false;
}

function setupMaze(L) {
  mazeCols = 19; mazeRows = 13;
  mazeTile = Math.floor(Math.min((W - 6) / mazeCols, (H - 6) / mazeRows));
  mazeOffX = Math.floor((W - mazeCols * mazeTile) / 2);
  mazeOffY = Math.floor((H - mazeRows * mazeTile) / 2);
  mazeGrid = genMaze(mazeCols, mazeRows);
  // abrir algunos muros para crear bucles (menos callejones sin salida)
  let loops = 20;
  while (loops-- > 0) {
    const x = 1 + Math.floor(Math.random() * (mazeCols - 2));
    const y = 1 + Math.floor(Math.random() * (mazeRows - 2));
    if (mazeGrid[y][x] === '#' &&
      ((mazeGrid[y][x - 1] !== '#' && mazeGrid[y][x + 1] !== '#') ||
       (mazeGrid[y - 1][x] !== '#' && mazeGrid[y + 1][x] !== '#'))) {
      mazeGrid[y][x] = ' ';
    }
  }
  // jugador arriba-izquierda
  const pc = mazeCenter(1, 1);
  mz = { px: pc.x, py: pc.y, size: mazeTile * 0.62, dir: { x: 0, y: 1 }, speed: Math.max(2, mazeTile * 0.13) };
  // salida abajo-derecha
  mazeExit = { cx: mazeCols - 2, cy: mazeRows - 2 };
  mazeGrid[mazeExit.cy][mazeExit.cx] = ' ';
  // monedas opcionales en pasillos
  mazeDots = [];
  for (let y = 0; y < mazeRows; y++) { mazeDots[y] = []; for (let x = 0; x < mazeCols; x++) mazeDots[y][x] = null; }
  const open = [];
  for (let y = 1; y < mazeRows - 1; y++) for (let x = 1; x < mazeCols - 1; x++) if (mazeGrid[y][x] !== '#') open.push({ x, y });
  shuffleArr(open);
  let placed = 0;
  for (const o of open) {
    if (placed >= 12) break;
    if ((o.x === 1 && o.y === 1) || (o.x === mazeExit.cx && o.y === mazeExit.cy)) continue;
    mazeDots[o.y][o.x] = 'dot'; placed++;
  }
  // monstruos (lejos del inicio)
  const n = L.monsters || 4;
  const colors = ['#ff5b5b', '#ff9be0', '#6be0ff', '#b6ff6b', '#ffb74d', '#c08bff'];
  ghosts = [];
  let mi = 0;
  for (const o of open) {
    if (ghosts.length >= n) break;
    if (Math.abs(o.x - 1) + Math.abs(o.y - 1) < 7) continue;
    if (o.x === mazeExit.cx && o.y === mazeExit.cy) continue;
    const c = mazeCenter(o.x, o.y);
    ghosts.push({ px: c.x, py: c.y, size: mazeTile * 0.6, dir: randDir(), color: colors[mi % colors.length], speed: Math.max(1.1, mazeTile * 0.08), retarget: 0 });
    mi++;
  }
  mazeGrace = 60; levelIntro = 100; tick = 0; particles = []; mazeWin = 0;
}

function moveMonster(m) {
  const half = m.size / 2;
  const nx = m.px + m.dir.x * m.speed, ny = m.py + m.dir.y * m.speed;
  if (!mazeBlocked(nx, ny, half)) { m.px = nx; m.py = ny; m.retarget--; }
  else m.retarget = 0;
  if (m.retarget <= 0) {
    const dirs = [{ x: 1, y: 0 }, { x: -1, y: 0 }, { x: 0, y: 1 }, { x: 0, y: -1 }]
      .filter(d => !mazeBlocked(m.px + d.x * (half + 3), m.py + d.y * (half + 3), half));
    if (dirs.length) {
      let chosen;
      if (Math.random() < 0.55) {
        let best = null, bd = Infinity;
        for (const d of dirs) {
          const dist = Math.hypot((m.px + d.x * 26) - mz.px, (m.py + d.y * 26) - mz.py);
          if (dist < bd) { bd = dist; best = d; }
        }
        chosen = best;
      } else chosen = dirs[Math.floor(Math.random() * dirs.length)];
      m.dir = chosen;
    }
    m.retarget = 16 + Math.floor(Math.random() * 30);
  }
}

function updateMaze() {
  if (lifeMsg > 0) lifeMsg--;
  if (mazeGrace > 0) mazeGrace--;
  if (levelIntro > 0) { levelIntro--; return; }
  if (mazeWin > 0) { mazeWin--; if (mazeWin === 0) completeLevel(); return; }

  const half = mz.size / 2;
  let vx = 0, vy = 0;
  if (keys.left) vx = -mz.speed; else if (keys.right) vx = mz.speed;
  if (keys.up) vy = -mz.speed; else if (keys.down) vy = mz.speed;
  if (vx) { const nx = mz.px + vx; if (!mazeBlocked(nx, mz.py, half)) mz.px = nx; mz.dir = { x: Math.sign(vx), y: 0 }; }
  if (vy) { const ny = mz.py + vy; if (!mazeBlocked(mz.px, ny, half)) mz.py = ny; mz.dir = { x: 0, y: Math.sign(vy) }; }

  const pcx = Math.floor((mz.px - mazeOffX) / mazeTile), pcy = Math.floor((mz.py - mazeOffY) / mazeTile);
  // recoger moneda
  if (mazeDots[pcy] && mazeDots[pcy][pcx] === 'dot') {
    mazeDots[pcy][pcx] = null; coinsCollected++;
    while (coinsCollected >= nextLifeAt) { nextLifeAt += 30; lives++; lifeMsg = 110; beep(784, 0, 0.10, 'square', 0.18); }
    coinSound(); updateHUD();
  }
  // llegar a la salida
  if (pcx === mazeExit.cx && pcy === mazeExit.cy) {
    mazeWin = 45; startChime(); spawnParticles(mz.px, mz.py, '#ffd24d', 24); return;
  }
  // monstruos
  for (const m of ghosts) moveMonster(m);
  if (mazeGrace <= 0) {
    for (const m of ghosts) {
      if (Math.hypot(mz.px - m.px, mz.py - m.py) < (mz.size + m.size) / 2 * 0.82) { loseLife(); return; }
    }
  }
  for (const pt of particles) { pt.x += pt.vx; pt.y += pt.vy; pt.vy += 0.15; pt.life--; }
  particles = particles.filter(pt => pt.life > 0);
}

function roundRectPath(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function renderMaze() {
  ctx.fillStyle = '#0a0a23'; ctx.fillRect(0, 0, W, H);
  // paredes
  for (let cy = 0; cy < mazeRows; cy++) for (let cx = 0; cx < mazeCols; cx++) {
    if (mazeGrid[cy][cx] === '#') {
      const x = mazeOffX + cx * mazeTile, y = mazeOffY + cy * mazeTile;
      ctx.fillStyle = '#1d2b8a'; roundRectPath(x + 1, y + 1, mazeTile - 2, mazeTile - 2, 5); ctx.fill();
      ctx.fillStyle = '#33489c'; roundRectPath(x + 3, y + 3, mazeTile - 6, mazeTile - 6, 4); ctx.fill();
    }
  }
  // salida (portal con estrella)
  const ec = mazeCenter(mazeExit.cx, mazeExit.cy);
  const pr = mazeTile * 0.38 + Math.sin(tick * 0.15) * 2;
  ctx.fillStyle = '#1f7a3a'; roundRectPath(mazeOffX + mazeExit.cx * mazeTile + 2, mazeOffY + mazeExit.cy * mazeTile + 2, mazeTile - 4, mazeTile - 4, 6); ctx.fill();
  ctx.fillStyle = '#56e07a'; ctx.beginPath(); ctx.arc(ec.x, ec.y, pr, 0, 6.28); ctx.fill();
  ctx.fillStyle = '#0a2a14'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.font = 'bold ' + Math.floor(mazeTile * 0.5) + 'px system-ui, sans-serif';
  ctx.fillText('★', ec.x, ec.y + 1);
  ctx.textBaseline = 'alphabetic';
  // monedas
  for (let cy = 0; cy < mazeRows; cy++) for (let cx = 0; cx < mazeCols; cx++) {
    if (mazeDots[cy] && mazeDots[cy][cx] === 'dot') {
      const c = mazeCenter(cx, cy);
      ctx.fillStyle = '#ffd24d'; ctx.beginPath(); ctx.arc(c.x, c.y, mazeTile * 0.16, 0, 6.28); ctx.fill();
    }
  }
  // partículas
  for (const pt of particles) { ctx.globalAlpha = Math.max(0, pt.life / 30); ctx.fillStyle = pt.color; ctx.fillRect(pt.x, pt.y, 3, 3); }
  ctx.globalAlpha = 1;
  // monstruos
  for (const m of ghosts) drawMonster(m);
  // jugador
  drawMazePlayer();

  ctx.fillStyle = '#fff'; ctx.font = 'bold 12px system-ui, sans-serif'; ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
  ctx.fillText('Llega a la ★', 8, 18);

  if (lifeMsg > 0) {
    ctx.globalAlpha = Math.min(1, lifeMsg / 30); ctx.fillStyle = '#ffd24d'; ctx.font = 'bold 22px system-ui, sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('¡Vida extra!', W / 2, 40); ctx.globalAlpha = 1;
  }
  if (levelIntro > 0) {
    ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#ffd24d'; ctx.font = 'bold 26px system-ui, sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('LABERINTO', W / 2, H / 2 - 10);
    ctx.fillStyle = '#fff'; ctx.font = 'bold 13px system-ui, sans-serif';
    ctx.fillText('Escapa hasta la ★ y evita a los monstruos', W / 2, H / 2 + 16);
  }
  if (mazeWin > 0) {
    ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#7fffa0'; ctx.font = 'bold 28px system-ui, sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('¡Salida!', W / 2, H / 2);
  }
  ctx.textAlign = 'left';
}

function drawMonster(m) {
  const r = m.size / 2;
  // pinchos giratorios
  ctx.fillStyle = m.color;
  for (let i = 0; i < 8; i++) {
    const a = i / 8 * 6.28 + tick * 0.04;
    ctx.beginPath();
    ctx.moveTo(m.px + Math.cos(a) * r, m.py + Math.sin(a) * r);
    ctx.lineTo(m.px + Math.cos(a + 0.16) * (r + 4), m.py + Math.sin(a + 0.16) * (r + 4));
    ctx.lineTo(m.px + Math.cos(a + 0.32) * r, m.py + Math.sin(a + 0.32) * r);
    ctx.closePath(); ctx.fill();
  }
  // cuerpo
  ctx.fillStyle = m.color;
  ctx.beginPath(); ctx.arc(m.px, m.py, r, 0, 6.28); ctx.fill();
  // ojos mirando al jugador
  const dx = mz.px - m.px, dy = mz.py - m.py, d = Math.hypot(dx, dy) || 1;
  const ox = dx / d * r * 0.3, oy = dy / d * r * 0.3;
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(m.px - r * 0.32, m.py - r * 0.1, r * 0.28, 0, 6.28); ctx.arc(m.px + r * 0.32, m.py - r * 0.1, r * 0.28, 0, 6.28); ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(m.px - r * 0.32 + ox, m.py - r * 0.1 + oy, r * 0.14, 0, 6.28); ctx.arc(m.px + r * 0.32 + ox, m.py - r * 0.1 + oy, r * 0.14, 0, 6.28); ctx.fill();
}

function drawMazePlayer() {
  const s = mz.size * 1.18;
  let ang = 0;                       // por defecto mira hacia arriba (frente = -y)
  if (mz.dir.y === 1) ang = Math.PI;            // abajo
  else if (mz.dir.x === -1) ang = -Math.PI / 2; // izquierda
  else if (mz.dir.x === 1) ang = Math.PI / 2;   // derecha
  ctx.save();
  ctx.translate(mz.px, mz.py);
  ctx.rotate(ang);
  drawTopDownChar(s, selectedChar);
  ctx.restore();
}

// Dibuja al personaje VISTO DESDE ARRIBA, mirando hacia -y (la rotación lo orienta)
function drawTopDownChar(s, sel) {
  const cfg = [
    { body: '#f49ac2', hair: '#241712', skin: '#e0a878', hairR: 0.42 },                 // Amelia
    { body: '#ffffff', hair: '#e22631', skin: '#e6b088', hairR: 0.45, side: '#b41b27' }, // Abril
    { body: '#ffffff', hair: '#15110e', skin: '#c69462', hairR: 0.50, glasses: true, afro: true }, // Pablo
  ][sel] || { body: '#f49ac2', hair: '#241712', skin: '#e0a878', hairR: 0.42 };

  // hombros / cuerpo (detrás, ropa)
  ctx.fillStyle = cfg.body;
  ctx.beginPath(); ctx.ellipse(0, s * 0.17, s * 0.50, s * 0.31, 0, 0, 6.28); ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.30)'; ctx.lineWidth = 1; ctx.stroke();
  // brazos (piel)
  ctx.fillStyle = cfg.skin;
  ctx.beginPath(); ctx.ellipse(-s * 0.47, s * 0.13, s * 0.12, s * 0.20, 0, 0, 6.28); ctx.fill();
  ctx.beginPath(); ctx.ellipse(s * 0.47, s * 0.13, s * 0.12, s * 0.20, 0, 0, 6.28); ctx.fill();

  // afro voluminoso (Pablo): bultos alrededor
  if (cfg.afro) {
    ctx.fillStyle = cfg.hair;
    for (let i = 0; i < 7; i++) {
      const a = i / 7 * 6.28;
      ctx.beginPath(); ctx.arc(Math.cos(a) * s * 0.40, -s * 0.05 + Math.sin(a) * s * 0.40, s * 0.18, 0, 6.28); ctx.fill();
    }
  }
  // mechones laterales (Abril)
  if (cfg.side) {
    ctx.fillStyle = cfg.side;
    ctx.beginPath(); ctx.ellipse(-s * 0.38, s * 0.04, s * 0.15, s * 0.32, 0, 0, 6.28); ctx.fill();
    ctx.beginPath(); ctx.ellipse(s * 0.38, s * 0.04, s * 0.15, s * 0.32, 0, 0, 6.28); ctx.fill();
  }

  // cabeza (pelo visto desde arriba)
  ctx.fillStyle = cfg.hair;
  ctx.beginPath(); ctx.arc(0, -s * 0.05, s * cfg.hairR, 0, 6.28); ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.35)'; ctx.lineWidth = 1; ctx.stroke();
  // cara (frente, piel)
  ctx.fillStyle = cfg.skin;
  ctx.beginPath(); ctx.arc(0, -s * 0.17, s * 0.26, 0, 6.28); ctx.fill();

  // detalles frontales
  if (cfg.glasses) {
    ctx.fillStyle = '#0b0b0b';
    ctx.fillRect(-s * 0.22, -s * 0.27, s * 0.44, s * 0.12);
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(-s * 0.17, -s * 0.245, s * 0.07, s * 0.04);
    ctx.fillRect(s * 0.10, -s * 0.245, s * 0.07, s * 0.04);
  } else {
    ctx.fillStyle = '#241008';
    ctx.beginPath(); ctx.arc(-s * 0.10, -s * 0.22, s * 0.05, 0, 6.28); ctx.arc(s * 0.10, -s * 0.22, s * 0.05, 0, 6.28); ctx.fill();
  }
  // naricita
  ctx.fillStyle = sel === 2 ? '#ad7b48' : '#ca915f';
  ctx.fillRect(-s * 0.03, -s * 0.11, s * 0.06, s * 0.05);
}

// ---------- Modo Avión (shoot'em up) ----------
function setupPlane(L) {
  planeLen = L.length || 4000;
  planeScroll = L.scroll || 2.5;
  planeDist = 0; planeSpawnIdx = 0;
  pBullets = []; pMonsters = []; pStructs = [];
  plane = { x: 90, y: H / 2 - 11, w: 44, h: 22 };
  planeFire = 0; planeGrace = 90; levelIntro = 100; tick = 0; particles = [];
  // generar oleadas de monstruos y estructuras
  planeSpawns = [];
  let d = 240;
  while (d < planeLen - 240) {
    const r = Math.random();
    if (r < 0.30) {
      // monstruo
      planeSpawns.push({ at: d, type: 'monster', y: 40 + Math.random() * (H - 110), pattern: Math.random() < 0.5 ? 'sine' : 'straight', spd: 0.8 + Math.random() * 1.6 });
    } else if (r < 0.58) {
      // torre simple (arriba o abajo)
      planeSpawns.push({ at: d, type: 'struct', fromTop: Math.random() < 0.5, h: 90 + Math.random() * 130, hp: 3 + Math.floor(Math.random() * 3) });
    } else if (r < 0.82) {
      // par de torres con un hueco: obliga a esquivar por el espacio
      const gap = 86 + Math.random() * 40;
      const gapY = 46 + Math.random() * (H - 92 - gap);
      planeSpawns.push({ at: d, type: 'struct', fromTop: true, h: gapY, hp: 4 });
      planeSpawns.push({ at: d, type: 'struct', fromTop: false, h: H - (gapY + gap), hp: 4 });
    } else {
      // grupo de 3 monstruos en columna
      for (let k = 0; k < 3; k++) planeSpawns.push({ at: d + k * 120, type: 'monster', y: 55 + k * 85, pattern: 'straight', spd: 1.2 });
      d += 150;
    }
    d += 150 + Math.random() * 170;
  }
  planeSpawns.sort((a, b) => a.at - b.at);
}

function spawnPlaneObj(s) {
  if (s.type === 'monster') {
    pMonsters.push({ x: W + 30, y: s.y, w: 30, h: 26, hp: 1, pattern: s.pattern, spd: s.spd || 1.4, baseY: s.y, phase: Math.random() * 6.28 });
  } else {
    const h = s.h, y = s.fromTop ? 0 : H - h;
    pStructs.push({ x: W + 20, y, w: 42, h, hp: s.hp, maxHp: s.hp, fromTop: s.fromTop });
  }
}

function updatePlane() {
  if (lifeMsg > 0) lifeMsg--;
  if (planeGrace > 0) planeGrace--;
  if (levelIntro > 0) { levelIntro--; }

  // movimiento del avión
  const sp = 3.4;
  if (keys.up) plane.y -= sp;
  if (keys.down) plane.y += sp;
  if (keys.left) plane.x -= sp;
  if (keys.right) plane.x += sp;
  plane.x = Math.max(8, Math.min(W * 0.6, plane.x));
  plane.y = Math.max(6, Math.min(H - plane.h - 6, plane.y));

  // disparo automático (cadencia más lenta)
  planeFire--;
  if (planeFire <= 0) {
    planeFire = 26;
    pBullets.push({ x: plane.x + plane.w, y: plane.y + plane.h / 2 - 2, w: 13, h: 4, vx: 6.2 });
    beep(820, 0, 0.04, 'square', 0.06);
  }

  // avanzar y generar objetos
  if (levelIntro <= 0) {
    planeDist += planeScroll;
    while (planeSpawnIdx < planeSpawns.length && planeSpawns[planeSpawnIdx].at <= planeDist) {
      spawnPlaneObj(planeSpawns[planeSpawnIdx]); planeSpawnIdx++;
    }
    if (planeDist >= planeLen) { completeLevel(); return; }
  }

  // balas
  for (const b of pBullets) b.x += b.vx;
  pBullets = pBullets.filter(b => b.x < W + 20);

  // monstruos
  for (const m of pMonsters) {
    m.x -= planeScroll + m.spd;
    if (m.pattern === 'sine') m.y = m.baseY + Math.sin(tick * 0.06 + m.phase) * 40;
  }
  pMonsters = pMonsters.filter(m => m.x > -50);

  // estructuras
  for (const s of pStructs) s.x -= planeScroll;
  pStructs = pStructs.filter(s => s.x > -60);

  // balas vs monstruos
  for (const b of pBullets) {
    for (const m of pMonsters) {
      if (!m.dead && rectsOverlap(b, m)) {
        m.hp--; b.dead = true;
        if (m.hp <= 0) {
          m.dead = true;
          coinsCollected++;
          while (coinsCollected >= nextLifeAt) { nextLifeAt += 30; lives++; lifeMsg = 110; beep(784, 0, 0.10, 'square', 0.18); }
          spawnParticles(m.x + m.w / 2, m.y + m.h / 2, '#c08bff', 12);
          stompSound(); updateHUD();
        }
        break;
      }
    }
  }
  // balas vs estructuras
  for (const b of pBullets) {
    if (b.dead) continue;
    for (const s of pStructs) {
      if (rectsOverlap(b, s)) {
        s.hp--; b.dead = true;
        spawnParticles(b.x, b.y, '#caa37a', 6);
        if (s.hp <= 0) { s.dead = true; spawnParticles(s.x + s.w / 2, s.y + s.h / 2, '#caa37a', 16); beep(120, 0, 0.12, 'sawtooth', 0.12); }
        break;
      }
    }
  }
  pBullets = pBullets.filter(b => !b.dead);
  pMonsters = pMonsters.filter(m => !m.dead);
  pStructs = pStructs.filter(s => !s.dead);

  // partículas
  for (const pt of particles) { pt.x += pt.vx; pt.y += pt.vy; pt.vy += 0.15; pt.life--; }
  particles = particles.filter(pt => pt.life > 0);

  // choques contra el avión
  if (planeGrace <= 0) {
    for (const m of pMonsters) {
      if (rectsOverlap(plane, m)) { loseLife(); return; }
    }
    for (const s of pStructs) {
      if (rectsOverlap(plane, s)) { loseLife(); return; }
    }
  }
}

function renderPlane() {
  // cielo
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#1b2a4a'); g.addColorStop(1, '#46618f');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  // nubes parallax
  ctx.fillStyle = 'rgba(255,255,255,0.10)';
  for (let i = 0; i < 5; i++) {
    const cx = (((-planeDist * 0.3 + i * 175) % (W + 160)) + (W + 160)) % (W + 160) - 80;
    const cy = 36 + ((i * 61) % (H - 110));
    ctx.beginPath(); ctx.ellipse(cx, cy, 44, 16, 0, 0, 6.28); ctx.fill();
  }
  // estructuras
  for (const s of pStructs) drawStruct(s);
  // monstruos
  for (const m of pMonsters) drawPlaneMonster(m);
  // balas
  ctx.fillStyle = '#ffe23a';
  for (const b of pBullets) ctx.fillRect(b.x, b.y, b.w, b.h);
  // partículas
  for (const pt of particles) { ctx.globalAlpha = Math.max(0, pt.life / 30); ctx.fillStyle = pt.color; ctx.fillRect(pt.x, pt.y, 3, 3); }
  ctx.globalAlpha = 1;
  // avión
  drawPlane();

  // barra de progreso a la meta
  const pr = Math.min(1, planeDist / planeLen);
  ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.fillRect(W / 2 - 100, 12, 200, 8);
  ctx.fillStyle = '#ffd24d'; ctx.fillRect(W / 2 - 100, 12, 200 * pr, 8);
  ctx.fillStyle = '#fff'; ctx.font = 'bold 10px system-ui, sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('META ✈️', W / 2, 32);

  if (lifeMsg > 0) {
    ctx.globalAlpha = Math.min(1, lifeMsg / 30);
    ctx.fillStyle = '#ffd24d'; ctx.font = 'bold 22px system-ui, sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('¡Vida extra!', W / 2, 56); ctx.globalAlpha = 1;
  }
  if (levelIntro > 0) {
    ctx.fillStyle = 'rgba(0,0,0,0.45)'; ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#ffd24d'; ctx.font = 'bold 26px system-ui, sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('✈️ AL ATAQUE', W / 2, H / 2 - 8);
    ctx.fillStyle = '#fff'; ctx.font = 'bold 13px system-ui, sans-serif';
    ctx.fillText('Dispara a los monstruos y esquiva (o destruye) las torres', W / 2, H / 2 + 18);
  }
  ctx.textAlign = 'left';
}

function drawStruct(s) {
  ctx.fillStyle = '#5d4127';
  ctx.fillRect(s.x, s.y, s.w, s.h);
  ctx.fillStyle = '#7a5638';
  ctx.fillRect(s.x + 3, s.y + (s.fromTop ? 0 : 3), s.w - 6, s.h - 6);
  // ventanas iluminadas
  ctx.fillStyle = 'rgba(255,220,120,0.55)';
  for (let wy = s.y + 8; wy < s.y + s.h - 10; wy += 20) {
    ctx.fillRect(s.x + 7, wy, 8, 9);
    ctx.fillRect(s.x + s.w - 15, wy, 8, 9);
  }
  // grietas si está dañada
  if (s.hp < s.maxHp) {
    ctx.strokeStyle = 'rgba(0,0,0,0.5)'; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(s.x + s.w * 0.3, s.y + 6);
    ctx.lineTo(s.x + s.w * 0.6, s.y + s.h * 0.5);
    ctx.lineTo(s.x + s.w * 0.35, s.y + s.h - 6);
    ctx.stroke();
  }
}

function drawPlaneMonster(m) {
  const x = m.x + m.w / 2, y = m.y + m.h / 2;
  const f = Math.sin(tick * 0.3 + m.phase) * 4;
  ctx.fillStyle = '#7b3fd0';
  ctx.beginPath(); ctx.ellipse(x - 2, y - m.h / 2 + f, 9, 5, 0, 0, 6.28); ctx.fill();
  ctx.beginPath(); ctx.ellipse(x - 2, y + m.h / 2 - f, 9, 5, 0, 0, 6.28); ctx.fill();
  ctx.fillStyle = '#9b5de5';
  ctx.beginPath(); ctx.arc(x, y, m.w / 2, 0, 6.28); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(x - 5, y - 2, 4, 0, 6.28); ctx.arc(x + 5, y - 2, 4, 0, 6.28); ctx.fill();
  ctx.fillStyle = '#222';
  ctx.beginPath(); ctx.arc(x - 5, y - 2, 2, 0, 6.28); ctx.arc(x + 5, y - 2, 2, 0, 6.28); ctx.fill();
  // boca / dientes
  ctx.fillStyle = '#3a1d5c';
  ctx.fillRect(x - 6, y + 5, 12, 4);
}

function drawPlane() {
  const colorByChar = ['#ff8ad1', '#ff5b5b', '#7ad1ff'];
  const col = colorByChar[selectedChar] || '#dddddd';
  const x = plane.x, y = plane.y, w = plane.w, h = plane.h;
  ctx.save();
  if (planeGrace > 0 && Math.floor(tick / 6) % 2 === 0) ctx.globalAlpha = 0.5;
  // llama del motor (atrás)
  ctx.fillStyle = '#ffb347';
  const fl = 4 + Math.random() * 5;
  ctx.beginPath(); ctx.moveTo(x, y + h * 0.4); ctx.lineTo(x - fl, y + h / 2); ctx.lineTo(x, y + h * 0.6); ctx.closePath(); ctx.fill();
  // alas
  ctx.fillStyle = '#cfd6e6';
  ctx.beginPath(); ctx.moveTo(x + w * 0.4, y + h / 2); ctx.lineTo(x + w * 0.18, y - 6); ctx.lineTo(x + w * 0.58, y + h / 2); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(x + w * 0.4, y + h / 2); ctx.lineTo(x + w * 0.18, y + h + 6); ctx.lineTo(x + w * 0.58, y + h / 2); ctx.closePath(); ctx.fill();
  // fuselaje
  ctx.fillStyle = col;
  ctx.beginPath();
  ctx.moveTo(x + w, y + h / 2);
  ctx.lineTo(x + w * 0.45, y);
  ctx.lineTo(x, y + h * 0.32);
  ctx.lineTo(x, y + h * 0.68);
  ctx.lineTo(x + w * 0.45, y + h);
  ctx.closePath(); ctx.fill();
  // cabina
  ctx.fillStyle = '#22344f';
  ctx.beginPath(); ctx.arc(x + w * 0.62, y + h / 2, 4, 0, 6.28); ctx.fill();
  ctx.restore();
}

// ---------- Bucle principal ----------
reset(true);
updateHUD();
state = 'menu';

function loop() {
  update();
  render();
  requestAnimationFrame(loop);
}
loop();
</script>
