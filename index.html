<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Amelia Aventuras</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    min-height: 100vh;
    min-height: 100dvh;
    background: #1a1a2e;
    font-family: 'Trebuchet MS', 'Segoe UI', system-ui, sans-serif;
    color: #fff;
    -webkit-tap-highlight-color: transparent;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 12px;
  }
  #wrap {
    position: relative;
    width: 100%;
    max-width: 900px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    border-radius: 12px;
    overflow: hidden;
  }
  /* Mantiene la relación 16:9 en TODOS los navegadores, incluido Safari/iOS */
  #wrap::before {
    content: "";
    display: block;
    padding-bottom: 56.25%; /* 9 / 16 */
  }
  canvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    image-rendering: -webkit-optimize-contrast; /* Safari */
    image-rendering: pixelated;
  }
  /* HUD */
  #hud {
    position: absolute;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 18px;
    font-weight: bold;
    font-size: clamp(14px, 2.4vw, 20px);
    text-shadow: 2px 2px 0 rgba(0,0,0,0.45);
    pointer-events: none;
    letter-spacing: 1px;
  }
  .hud-item { display: flex; align-items: center; gap: 6px; }
  .coin-dot {
    width: 16px; height: 16px; border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #ffe680, #f5a623);
    box-shadow: inset -2px -2px 0 rgba(0,0,0,0.2);
  }
  .heart { color: #ff5577; font-size: 1.1em; }

  /* Overlays */
  .overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: safe center;
    text-align: center;
    background: rgba(15, 15, 35, 0.82);
    -webkit-backdrop-filter: blur(3px);
    backdrop-filter: blur(3px);
    padding: 20px;
    z-index: 10;
    overflow-y: auto;
  }
  .overlay.hidden { display: none; }
  .overlay h1 {
    font-size: clamp(28px, 6vw, 52px);
    margin-bottom: 8px;
    letter-spacing: 2px;
  }
  .overlay p { font-size: clamp(14px, 2.6vw, 19px); opacity: 0.85; margin-bottom: 22px; max-width: 520px; line-height: 1.5; }
  .keys { display: flex; gap: 18px; margin-bottom: 26px; flex-wrap: wrap; justify-content: center; }
  .keycap {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    font-size: clamp(11px, 2vw, 14px); opacity: 0.9;
  }
  .keycap b {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 44px; height: 44px; padding: 0 12px;
    background: #2b2b50; border-radius: 8px;
    border-bottom: 4px solid #16162e;
    font-size: clamp(14px, 2.4vw, 18px);
  }
  button {
    font-family: inherit; font-weight: bold;
    font-size: clamp(15px, 2.6vw, 19px);
    color: #1a1a2e;
    background: linear-gradient(#ffd24d, #f5a623);
    border: none; border-radius: 10px;
    padding: 14px 34px; cursor: pointer;
    border-bottom: 5px solid #c97e0e;
    transition: transform .06s, filter .15s;
    letter-spacing: 1px;
  }
  button:hover { filter: brightness(1.06); }
  button:active { transform: translateY(3px); border-bottom-width: 2px; }

  /* Campo de nombre */
  #playerName {
    font-family: inherit; font-size: 16px; text-align: center;
    padding: 11px 14px; border-radius: 9px;
    border: 2px solid #3a3a60; background: #20203a; color: #fff;
    margin-bottom: 18px; width: min(82%, 260px); outline: none;
    -webkit-appearance: none;
  }
  #playerName:focus { border-color: #f5a623; }
  #playerName::placeholder { color: #8a8ab0; }

  /* Tabla de líderes */
  .board {
    margin-top: 20px; width: min(88%, 320px);
    background: rgba(0,0,0,0.28); border-radius: 12px;
    padding: 12px 16px; font-size: 14px;
  }
  .board-title {
    font-weight: bold; margin-bottom: 8px; letter-spacing: .5px;
    color: #ffd24d; font-size: 15px;
  }
  .board-row {
    display: flex; justify-content: space-between; gap: 12px;
    padding: 4px 0; border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .board-row:last-child { border-bottom: none; }
  .board-row span:last-child { font-weight: bold; color: #ffd24d; }
  .board-row.me { color: #7fffa0; }
  .board-row.me span:last-child { color: #7fffa0; }
  .board-empty { opacity: .65; font-style: italic; }

  /* Mobile touch controls — visibles por defecto; se ocultan solo en escritorio con mouse */
  #touch {
    position: absolute; bottom: 0; left: 0; right: 0;
    display: flex; justify-content: space-between;
    padding: 14px; pointer-events: none; z-index: 5;
  }
  .pad { display: flex; gap: 14px; pointer-events: auto; }
  .tbtn {
    width: 72px; height: 72px; border-radius: 50%;
    background: rgba(255,255,255,0.22);
    border: 2px solid rgba(255,255,255,0.45);
    color: #fff; font-size: 30px; font-weight: bold;
    display: flex; align-items: center; justify-content: center;
    user-select: none; backdrop-filter: blur(4px);
    -webkit-user-select: none; -webkit-backdrop-filter: blur(4px);
    touch-action: none;
    -webkit-touch-callout: none;
  }
  .tbtn:active { background: rgba(255,255,255,0.4); transform: scale(0.94); }
  /* En laberinto: ocultar biberón y mostrar flecha abajo; al revés en plataformas */
  .tbtn[data-key="down"] { display: none; }
  body.maze .tbtn[data-key="down"] { display: flex; }
  body.maze .tbtn[data-key="throw"] { display: none; }
  body.plane .tbtn[data-key="down"] { display: flex; }
  body.plane .tbtn[data-key="throw"] { display: none; }
  /* Ocultar los botones solo en escritorio con mouse (puntero fino + hover) */
  @media (hover: hover) and (pointer: fine) { #touch { display: none; } }
  body.touch #touch { display: flex; }

  /* Sticker de muerte (Game Over) */
  #deathSticker { margin-bottom: 14px; }
  #deathSticker.hidden { display: none; }
  #deathSticker:not(.hidden) {
    animation: stickerPop .55s cubic-bezier(.18,1.5,.45,1) both;
  }
  #deathSticker img {
    width: min(46vw, 220px);
    height: auto; display: block;
    filter: drop-shadow(0 10px 22px rgba(0,0,0,.55));
  }
  #deathSticker:not(.hidden) img {
    animation: stickerWobble 1.1s ease-in-out .55s infinite;
  }
  @keyframes stickerPop {
    0%   { transform: scale(0) rotate(-18deg); opacity: 0; }
    60%  { transform: scale(1.12) rotate(7deg); opacity: 1; }
    80%  { transform: scale(.96) rotate(-3deg); }
    100% { transform: scale(1) rotate(0); opacity: 1; }
  }
  @keyframes stickerWobble {
    0%,100% { transform: rotate(-2.5deg); }
    50%     { transform: rotate(2.5deg); }
  }
  #charPreviewWrap { display:flex; flex-direction:column; align-items:center; gap:5px; margin:2px 0 8px; }
  #charPreview { image-rendering:pixelated; width:84px; height:98px; background:rgba(255,255,255,0.07); border:2px solid rgba(255,210,77,0.55); border-radius:14px; }
  #charPreviewName { font-size:15px; font-weight:800; letter-spacing:0.3px; }
  #charSelect { display:flex; flex-wrap:nowrap; gap:8px; justify-content:center; margin:8px 0 4px; }
  .charBtn {
    position:relative;
    display:flex; flex-direction:column; align-items:center; gap:3px;
    background:rgba(255,255,255,0.08); border:3px solid transparent; border-radius:12px;
    padding:6px 9px; cursor:pointer; color:#fff; font:inherit; transition:.15s;
  }
  .charBtn canvas { image-rendering:pixelated; width:42px; height:49px; }
  .charBtn span { font-size:12px; font-weight:700; white-space:nowrap; }
  .charBtn.selected { border-color:#ffd24d; background:rgba(255,210,77,0.22); transform:translateY(-2px); }
  .charBtn.selected::after {
    content:'✓'; position:absolute; top:-7px; right:-7px;
    width:19px; height:19px; border-radius:50%; background:#ffd24d; color:#1a1a2e;
    font-size:12px; font-weight:900; display:flex; align-items:center; justify-content:center;
    box-shadow:0 1px 4px rgba(0,0,0,0.45);
  }
  #levelSelect { display:flex; flex-wrap:wrap; gap:6px; justify-content:center; align-items:center; margin:4px 0 12px; }
  .lvlLabel { font-size:12px; opacity:0.8; margin-right:2px; }
  .lvlBtn { min-width:42px; height:34px; padding:0 8px; border-radius:9px; border:2px solid transparent; background:rgba(255,255,255,0.08); color:#fff; font:inherit; font-size:13px; font-weight:700; cursor:pointer; }
  .lvlBtn.selected { border-color:#ffd24d; background:rgba(255,210,77,0.18); }
</style>
</head>

<div id="wrap">
  <canvas id="game" width="640" height="360"></canvas>

  <div id="hud">
    <div class="hud-item"><span class="coin-dot"></span><span id="coins">0</span></div>
    <div class="hud-item" id="bottlesHud" style="display:none">🍼 <span id="bottleCount">0</span></div>
    <div class="hud-item" id="lives"></div>
  </div>

  <div class="overlay" id="startScreen">
    <h1>⛰️ Amelia Aventuras</h1>

    <div id="charPreviewWrap">
      <canvas id="charPreview" width="48" height="56"></canvas>
      <div id="charPreviewName">👶 Amelia</div>
    </div>
    <div id="charSelect">

      <div class="charBtn" data-char="1"><span>👧 Abril</span></div>
      <div class="charBtn" data-char="2"><span>🕶️ Pablo</span></div>
    </div>
    <div id="levelSelect">
      <span class="lvlLabel">Empezar en:</span>
      <button class="lvlBtn selected" data-lvl="0">1 ☀️</button>
      <button class="lvlBtn" data-lvl="1">2 🌧️</button>
      <button class="lvlBtn" data-lvl="2">3 ⛰️</button>
      <button class="lvlBtn" data-lvl="3">4 🤿</button>
      <button class="lvlBtn" data-lvl="4">5 🟡</button>
      <button class="lvlBtn" data-lvl="5">6 ✈️</button>
      <button class="lvlBtn" data-lvl="6">7 🕳️</button>
      <button class="lvlBtn" data-lvl="7">8 ⛈️</button>
    </div>
    <input id="playerName" type="text" placeholder="Tu nombre" maxlength="12" autocomplete="off" autocorrect="off" spellcheck="false">
    <button id="startBtn">Jugar</button>
    <div id="startBoard" class="board"></div>

function loadLevel(i) {
  currentLevel = i;
  const L = LEVELS[i];
  mazeMode = false; planeMode = false;
  document.body.classList.remove('maze', 'plane');
  if (L.maze) {
    mazeMode = true;
    document.body.classList.add('maze');
    setupMaze(L);
    updateHUD();
    return;
  }
  if (L.plane) {
    planeMode = true;
    document.body.classList.add('plane');
    setupPlane(L);
    updateHUD();
    return;
  }
  LEVEL_END = L.end;
  platforms = L.platforms.map(p => ({...p}));
  movers = platforms.filter(p => p.move);
  movers.forEach(m => { m.baseX = m.x; m.baseY = m.y; m.dx = 0; m.dy = 0; });
  coins = (L.coins || []).map(c => ({x:c[0], y:c[1], r:9, got:false, bob:Math.random()*Math.PI*2}));
  enemies = (L.enemies || []).map(e => {
    const type = e.type || 'walker';
    const baseY = (e.y != null ? e.y : (type === 'flyer' ? 175 : 296));
    return {
      type, x:e.x, y:baseY, baseY, w:28, h:24, dir:-1, vy:0,
      minX:e.minX, maxX:e.maxX, dead:false, squish:0,
      amp: (e.amp != null ? e.amp : 40),
      phase: Math.random() * Math.PI * 2,
      spd: (e.spd != null ? e.spd : 1.4),
      spdMul: (e.spdMul != null ? e.spdMul : (L.slow ? 0.55 : 1)),
      hp: (e.hp != null ? e.hp : 1), maxHp: (e.hp != null ? e.hp : 1), hurt: 0,
      hopTimer: 30 + Math.floor(Math.random() * 60)
    };
  });
  boss = L.boss ? makeBoss(L.boss) : null;
  items = [];
  bottles = [];
  throwCooldown = 0;
  const sx = L.start ? L.start[0] : 60;
  const sy = L.start ? L.start[1] : 250;
  player = {
    x: sx, y: sy, w: 26, h: 30, vx: 0, vy: 0,
    onGround: false, face: 1, walk: 0, dead: false, deadTimer: 0, ground: null,
    invincible: 0
  };
  camX = 0; camY = 0; strokeCooldown = 0;
  particles = []; flagRaise = 0; levelIntro = 100; tick = 0;
  // Entrada por tubo (nivel subterráneo): el jugador cae desde el tubo del techo
  pipeDive = 0;
  if (L.pipeIn) {
    pipeDive = 30;
    player.x = L.pipeIn.x + L.pipeIn.w / 2 - player.w / 2;
    player.y = L.pipeIn.mouthY - player.h - 8;
    player.vx = 0; player.vy = 0; player.onGround = false;
  }
}

function makeBoss(cfg) {
  return {
    x: cfg.x, y: cfg.ground - cfg.h, w: cfg.w, h: cfg.h,
    vx: 0, dir: -1, face: -1, onGround: true,
    minX: cfg.minX, maxX: cfg.maxX, groundY: cfg.ground,
    hp: cfg.hp, maxHp: cfg.hp, hitFlash: 0, invuln: 0, alive: true,
    projectiles: [], shootTimer: 110, intro: 60
  };
}

function reset(full) {
  if (full) { coinsCollected = 0; lives = 3; currentLevel = startLevel; bottleAmmo = 0; nextLifeAt = 30; }
  loadLevel(currentLevel);
}

function nextLevel() {
  startChime();
  loadLevel(currentLevel + 1);
}
function completeLevel() {
  if (currentLevel < LEVELS.length - 1) nextLevel();
  else { state = 'win'; win(); }
}

// ---------- Input ----------
const keys = { left:false, right:false, jump:false, up:false, down:false };
let jumpHeld = false;

window.addEventListener('keydown', e => {
  const k = e.key.toLowerCase();
  if (k === 'a' || k === 'arrowleft') keys.left = true;
  if (k === 'd' || k === 'arrowright') keys.right = true;
  if (k === 's' || k === 'arrowdown') { keys.down = true; e.preventDefault(); }
  if (k === 'arrowup' || k === 'w') keys.up = true;
  if (k === ' ' || k === 'spacebar' || k === 'arrowup' || k === 'w') {
    keys.jump = true; e.preventDefault();
  }
  if (k === 'j' || k === 'k' || k === 'enter') throwBottle();
});
window.addEventListener('keyup', e => {
  const k = e.key.toLowerCase();
  if (k === 'a' || k === 'arrowleft') keys.left = false;
  if (k === 'd' || k === 'arrowright') keys.right = false;
  if (k === 's' || k === 'arrowdown') keys.down = false;
  if (k === 'arrowup' || k === 'w') keys.up = false;
  if (k === ' ' || k === 'spacebar' || k === 'arrowup' || k === 'w') {
    keys.jump = false; jumpHeld = false;
  }
});

// Controles táctiles
// Detecta pantalla táctil (iPhone/iPad incluidos) y muestra los botones
if ('ontouchstart' in window || (navigator.maxTouchPoints || 0) > 0) {
  document.body.classList.add('touch');
}
document.querySelectorAll('.tbtn').forEach(btn => {
  const key = btn.dataset.key;
  const set = v => {
    if (key === 'throw') { if (v) throwBottle(); return; }
    if (key === 'left') keys.left = v;
    if (key === 'right') keys.right = v;
    if (key === 'down') keys.down = v;
    if (key === 'up') { keys.up = v; }
    if (key === 'jump') { keys.jump = v; keys.up = v; if (!v) jumpHeld = false; }
  };
  btn.addEventListener('touchstart', e => { e.preventDefault(); set(true); }, {passive:false});
  btn.addEventListener('touchend',   e => { e.preventDefault(); set(false); }, {passive:false});
  btn.addEventListener('touchcancel',e => { e.preventDefault(); set(false); }, {passive:false});
  btn.addEventListener('mousedown',  () => set(true));
  btn.addEventListener('mouseup',    () => set(false));
  btn.addEventListener('mouseleave', () => set(false));
});

// ---------- Física / lógica ----------
function rectsOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

// Lanzar un biberón en la dirección que mira el jugador
function throwBottle() {
  if (state !== 'play' || !player || player.dead) return;
  if (throwCooldown > 0 || bottleAmmo <= 0) return;
  throwCooldown = 20;
  bottleAmmo--;
  const p = player;
  bottles.push({
    x: p.x + p.w / 2 + p.face * 14,
    y: p.y + 8,
    vx: p.face * 6.5,
    vy: 0,
    r: 8,
    spin: 0,
    life: 75
  });
  beep(880, 0, 0.07, 'triangle', 0.14);
}

// Golpear un bloque "?" suelta un power-up ALEATORIO (estrella o biberones)
function hitBlock(plat) {
  plat.used = true;
  plat.bump = 8; // animación de rebote (solo visual)
  beep(330, 0, 0.06, 'square', 0.14);
  const type = Math.random() < 0.5 ? 'star' : 'bottle';
  items.push({
    x: plat.x + plat.w / 2 - 10, y: plat.y - 22, w: 20, h: 20,
    vy: -3.5, type, settled: false, got: false, bob: 0
  });
}

// Romper un bloque de ladrillo al golpearlo con la cabeza
function breakBrick(plat) {
  plat.broken = true;
  beep(240, 0, 0.05, 'square', 0.14);
  stompSound();
  // pedazos volando
  for (let i = 0; i < 4; i++) {
    particles.push({
      x: plat.x + 6 + (i % 2) * 18, y: plat.y + 6 + Math.floor(i / 2) * 16,
      color: '#b5651d',
      vx: (i % 2 ? 1 : -1) * (1.5 + Math.random()),
      vy: -4 - Math.random() * 2,
      life: 30 + Math.random() * 10, size: 5
    });
  }
}

function update() {
  if (state !== 'play') return;
  tick++;
  if (mazeMode) { updateMaze(); return; }
  if (planeMode) { updatePlane(); return; }
  const p = player;
  if (throwCooldown > 0) throwCooldown--;

  // Bajada por el tubo del techo (intro del nivel subterráneo)
  if (pipeDive > 0) {
    pipeDive--;
    p.y += 3.2; p.face = 1;
    camX = 0; camY = 0;
    return;
  }
  if (p.invincible > 0) p.invincible--;

  // Actualiza plataformas móviles y guarda su desplazamiento (dx,dy) de este frame
  for (const m of movers) {
    const ox = m.x, oy = m.y;
    if (m.move.axis === 'x') m.x = m.baseX + Math.sin(tick * m.move.speed + m.move.phase) * m.move.range;
    else                     m.y = m.baseY + Math.sin(tick * m.move.speed + m.move.phase) * m.move.range;
    m.dx = m.x - ox; m.dy = m.y - oy;
  }

  if (p.dead) {
    p.deadTimer++;
    p.vy += GRAVITY;
    p.y += p.vy;
    if (p.deadTimer > 70) loseLife();
    return;
  }

  // Si venía parado sobre una plataforma móvil, lo arrastra con ella
  if (p.ground && p.ground.move) { p.x += p.ground.dx || 0; p.y += p.ground.dy || 0; }

  const L = LEVELS[currentLevel];
  const inWater = !!(L && L.water);
  if (strokeCooldown > 0) strokeCooldown--;

  if (inWater) {
    // ---- Nado: movimiento flotante en todas direcciones ----
    if (keys.left)  { p.vx -= 0.35; p.face = -1; }
    if (keys.right) { p.vx += 0.35; p.face = 1; }
    p.vx *= 0.90;
    p.vx = Math.max(-3, Math.min(3, p.vx));
    if (Math.abs(p.vx) < 0.04) p.vx = 0;
    // brazada hacia arriba al mantener saltar (auto-repetida)
    if (keys.jump && strokeCooldown <= 0) {
      p.vy = -3.2; strokeCooldown = 16;
      beep(520, 0, 0.05, 'sine', 0.08);
    }
    p.vy += 0.16;       // hundimiento suave
    p.vy *= 0.94;       // resistencia del agua
    p.vy = Math.max(-3.6, Math.min(3.2, p.vy));
  } else {
    // ---- Movimiento normal en tierra ----
    const accel = 0.7, maxSpeed = 4.2, friction = 0.8;
    if (keys.left)  { p.vx -= accel; p.face = -1; }
    if (keys.right) { p.vx += accel; p.face = 1; }
    if (!keys.left && !keys.right) p.vx *= friction;
    p.vx = Math.max(-maxSpeed, Math.min(maxSpeed, p.vx));
    if (Math.abs(p.vx) < 0.05) p.vx = 0;

    // Salto (con salto variable según cuánto se mantenga)
    if (keys.jump && p.onGround && !jumpHeld) {
      p.vy = -11.5;
      p.onGround = false;
      p.ground = null;
      jumpHeld = true;
    }
    if (!keys.jump && p.vy < -4) p.vy = -4; // recorta el salto al soltar

    p.vy += GRAVITY;
    if (p.vy > 14) p.vy = 14;
  }

  // Mover en X y resolver colisiones
  p.x += p.vx;
  for (const plat of platforms) {
    if (plat.broken) continue;
    if (rectsOverlap(p, plat)) {
      // Empuja según el lado (centro del jugador vs centro de la plataforma),
      // no según la tecla: así una plataforma móvil que se mete de lado no
      // provoca teletransportes ni saltos raros.
      const pc = p.x + p.w / 2, mc = plat.x + plat.w / 2;
      if (pc < mc) p.x = plat.x - p.w;
      else p.x = plat.x + plat.w;
      p.vx = 0;
    }
  }
  if (p.x < 0) { p.x = 0; p.vx = 0; }

  // Mover en Y y resolver colisiones
  p.y += p.vy;
  p.onGround = false;
  p.ground = null;
  for (const plat of platforms) {
    if (plat.broken) continue;
    if (rectsOverlap(p, plat)) {
      if (p.vy > 0) { p.y = plat.y - p.h; p.onGround = true; p.ground = plat; p.vy = 0; }
      else if (p.vy < 0) {
        if (plat.brick) { breakBrick(plat); p.vy = 1; }               // ladrillo: se rompe
        else if (plat.block && !plat.used) { p.y = plat.y + plat.h; hitBlock(plat); p.vy = 0; } // "?": suelta power-up
        else if (plat.block && plat.used) { breakBrick(plat); p.vy = 1; }  // "?" ya usado: se rompe
        else { p.y = plat.y + plat.h; p.vy = 0; }
        break; // golpe de cabeza resuelto: no re-evaluar otras plataformas este frame (evita teletransporte)
      } else { p.vy = 0; }
    }
  }

  // Animación de caminar
  if (p.onGround && Math.abs(p.vx) > 0.5) p.walk += 0.25;
  else p.walk = 0;

  // Cámara: vertical en niveles de escalada, horizontal en el resto
  if (L && L.vertical) {
    camX = 0;
    const wh = L.height || 1400;
    camY = Math.max(0, Math.min(p.y - H * 0.55, wh - H));
  } else {
    camX = p.x - W * 0.4;
    camX = Math.max(0, Math.min(camX, LEVEL_END - W + 120));
    camY = 0;
  }

  // Caída al vacío (en el agua no se cae)
  if (!inWater) {
    const deathY = (L && L.vertical) ? ((L.height || 1400) + 40) : (H + 40);
    if (p.y > deathY) { p.dead = true; p.deadTimer = 60; }
  }

  // Monedas
  for (const c of coins) {
    if (!c.got) {
      c.bob += 0.1;
      if (Math.hypot((p.x+p.w/2)-c.x, (p.y+p.h/2)-c.y) < c.r + 16) {
        c.got = true;
        coinsCollected++;
        coinSound();
        spawnParticles(c.x, c.y, COLORS.coin, 8);
      }
    }
  }

  // Enemigos
  for (const e of enemies) {
    if (e.dead) { e.squish = Math.max(0, e.squish - 0.06); continue; }

    if (e.hurt > 0) e.hurt--;
    const sm = e.spdMul || 1;
    if (e.type === 'flyer') {
      e.x += e.dir * e.spd * sm;
      if (e.x < e.minX) { e.x = e.minX; e.dir = 1; }
      if (e.x + e.w > e.maxX) { e.x = e.maxX - e.w; e.dir = -1; }
      e.y = e.baseY + Math.sin(tick * 0.05 + e.phase) * e.amp;
    } else if (e.type === 'hopper') {
      e.x += e.dir * 0.8 * sm;
      if (e.x < e.minX) { e.x = e.minX; e.dir = 1; }
      if (e.x + e.w > e.maxX) { e.x = e.maxX - e.w; e.dir = -1; }
      e.vy += 0.5; e.y += e.vy;
      if (e.y >= e.baseY) {
        e.y = e.baseY; e.vy = 0; e.hopTimer--;
        if (e.hopTimer <= 0) { e.vy = -8.5; e.hopTimer = 45 + Math.floor(Math.random() * 50); }
      }
    } else {
      e.x += e.dir * 1.0 * sm;
      if (e.x < e.minX) { e.x = e.minX; e.dir = 1; }
      if (e.x + e.w > e.maxX) { e.x = e.maxX - e.w; e.dir = -1; }
    }

    if (rectsOverlap(p, e)) {
      const stomping = p.vy > 0 && (p.y + p.h) - e.y < 18;
      const canStomp = e.type !== 'spiky';
      if (p.invincible > 0) {
        e.dead = true; e.squish = 1; coinsCollected++;
        stompSound(); spawnParticles(e.x + e.w/2, e.y, COLORS.enemy, 10);
      } else if (stomping && canStomp) {
        p.vy = -8; // rebote
        e.hp--;
        if (e.hp <= 0) {
          e.dead = true; e.squish = 1; coinsCollected++;
          stompSound(); spawnParticles(e.x + e.w/2, e.y, COLORS.enemy, 10);
        } else {
          e.hurt = 12; stompSound(); // resiste el golpe
          spawnParticles(e.x + e.w/2, e.y, '#ffffff', 6);
        }
      } else {
        p.dead = true; p.deadTimer = 0; p.vy = -8;
      }
    }
  }

  // ----- Power-ups salidos de los bloques -----
  for (const it of items) {
    if (it.got) continue;
    if (!it.settled) {
      it.vy += 0.4; it.y += it.vy;
      // se posa sobre una plataforma
      for (const plat of platforms) {
        if (it.vy >= 0 && it.x + it.w > plat.x && it.x < plat.x + plat.w &&
            it.y + it.h >= plat.y && it.y + it.h <= plat.y + plat.h + 14) {
          it.y = plat.y - it.h; it.vy = 0; it.settled = true;
        }
      }
    }
    it.bob += 0.1;
    if (Math.hypot((p.x + p.w/2) - (it.x + it.w/2), (p.y + p.h/2) - (it.y + it.h/2)) < 22) {
      it.got = true;
      if (it.type === 'star') {
        p.invincible = 480;
        coinSound(); beep(1175, 0.06, 0.18, 'square', 0.18);
        spawnParticles(it.x + it.w/2, it.y, '#ffd24d', 18);
      } else {
        bottleAmmo += 5;
        coinSound(); beep(740, 0.05, 0.16, 'triangle', 0.16);
        spawnParticles(it.x + it.w/2, it.y, '#cfe2ff', 16);
      }
    }
  }
  items = items.filter(it => !it.got);

  // ----- Biberones lanzados por el jugador -----
  for (const bo of bottles) {
    bo.x += bo.vx; bo.y += bo.vy; bo.life--; bo.spin += 0.4;
    const boRect = { x: bo.x - 7, y: bo.y - 9, w: 14, h: 18 };
    // colisión con enemigos
    for (const e of enemies) {
      if (!e.dead && rectsOverlap(boRect, e)) {
        e.dead = true; e.squish = 1; coinsCollected++; stompSound();
        spawnParticles(e.x + e.w/2, e.y, COLORS.enemy, 10);
        bo.life = 0;
      }
    }
    // colisión con el jefe
    if (boss && boss.alive && bo.life > 0 && rectsOverlap(boRect, boss)) {
      const beforeLevel = currentLevel;
      hitBoss();
      spawnParticles(bo.x, bo.y, '#e8e8e8', 8);
      bo.life = 0;
      if (currentLevel !== beforeLevel) break; // cambió de nivel: no seguir con biberones viejos
    }
  }
  bottles = bottles.filter(bo => bo.life > 0 && (bo.x - camX) > -40 && (bo.x - camX) < W + 40);

  // ----- Jefe final -----
  if (boss && boss.alive) updateBoss(p);

  // Meta del nivel
  if (!boss) {
    if (L && L.vertical) {
      if (p.y < (L.winY != null ? L.winY : 90)) completeLevel();   // escalada: llegar arriba
    } else if (p.x + p.w > LEVEL_END + 20) {
      completeLevel();                                             // normal/agua: llegar al final
    }
  }

  // Partículas
  for (const pt of particles) {
    pt.x += pt.vx; pt.y += pt.vy; pt.vy += 0.25; pt.life--;
  }
  particles = particles.filter(pt => pt.life > 0);

  // Vida extra cada 30 monedas
  while (coinsCollected >= nextLifeAt) {
    nextLifeAt += 30;
    gainLife();
  }

  updateHUD();
}

function gainLife() {
  lives++;
  lifeMsg = 110;
  beep(784, 0, 0.10, 'square', 0.18);   // sol
  beep(1047, 0.10, 0.20, 'square', 0.18); // do agudo
  spawnParticles(player.x + player.w / 2, player.y, '#ff5d7a', 18);
}

function spawnParticles(x, y, color, n) {
  for (let i = 0; i < n; i++) {
    particles.push({
      x, y, color,
      vx: (Math.random()-0.5)*4,
      vy: -Math.random()*4 - 1,
      life: 25 + Math.random()*15,
      size: 2 + Math.random()*3
    });
  }
}

function loseLife() {
  lives--;
  if (lives <= 0) { state = 'gameover'; gameOver(); }
  else { reset(false); }
}

// ---------- Jefe ----------
function defeatBoss() {
  boss.alive = false;
  spawnParticles(boss.x + boss.w / 2, boss.y + boss.h / 2, '#e8e8e8', 30);
  if (currentLevel < LEVELS.length - 1) nextLevel();
  else { state = 'win'; win(); }
}
function hitBoss() {
  const b = boss;
  if (!b || !b.alive || b.invuln > 0) return false;
  b.hp--; b.hitFlash = 14; b.invuln = 45;
  stompSound();
  spawnParticles(b.x + b.w / 2, b.y, '#e8e8e8', 14);
  if (b.hp <= 0) defeatBoss();
  return true;
}

function updateBoss(p) {
  const b = boss;
  if (b.intro > 0) b.intro--;
  if (b.hitFlash > 0) b.hitFlash--;
  if (b.invuln > 0) b.invuln--;

  // ¿el jugador está cerca de la arena? (para no atacar de lejos)
  const near = Math.abs((p.x + p.w / 2) - (b.x + b.w / 2)) < 680;

  // Patrulla de un lado a otro
  b.x += b.dir * 1.3;
  if (b.x < b.minX) { b.x = b.minX; b.dir = 1; }
  if (b.x + b.w > b.maxX) { b.x = b.maxX - b.w; b.dir = -1; }
  // Mira hacia el jugador
  b.face = (p.x + p.w / 2 < b.x + b.w / 2) ? -1 : 1;

  // Lanza proyectiles ("manchas") hacia el jugador (solo si está cerca)
  b.shootTimer--;
  if (b.shootTimer <= 0 && b.intro <= 0 && near && !p.dead) {
    b.shootTimer = 110 + Math.floor(Math.random() * 50);
    const sx = b.x + b.w / 2, sy = b.y + 26;
    const dx = (p.x + p.w / 2) - sx, dy = (p.y + p.h / 2) - sy;
    const d = Math.hypot(dx, dy) || 1;
    const spd = 3.2;
    b.projectiles.push({ x: sx, y: sy, vx: (dx / d) * spd, vy: (dy / d) * spd - 1.2, r: 8, life: 220 });
    beep(150, 0, 0.14, 'sawtooth', 0.12);
  }

  // Mueve proyectiles y revisa impacto
  for (const pr of b.projectiles) {
    pr.x += pr.vx; pr.y += pr.vy; pr.vy += 0.12; pr.life--;
    if (!p.dead && Math.hypot((p.x + p.w / 2) - pr.x, (p.y + p.h / 2) - pr.y) < pr.r + 11) {
      if (p.invincible > 0) { pr.life = 0; }   // invencible: revienta la mancha
      else { p.dead = true; p.deadTimer = 0; p.vy = -8; }
    }
  }
  b.projectiles = b.projectiles.filter(pr => pr.life > 0 && pr.y < H + 40);

  // Colisión jugador-jefe
  if (!p.dead && rectsOverlap(p, b)) {
    const stomping = p.vy > 0 && (p.y + p.h) - b.y < 26;
    if (stomping) {
      hitBoss(); p.vy = -10;           // pisar la cabeza le quita vida
    } else if (p.invincible > 0) {
      hitBoss();                       // invencible: dañarlo al tocarlo
    } else if (b.invuln <= 0) {
      p.dead = true; p.deadTimer = 0; p.vy = -8;
    }
  }
}

// ---------- Dibujo ----------
let skyTick = 0;
let raindrops = [];
let lightning = 0;

function skyColors(weather) {
  if (weather === 'rain')  return ['#7d8aa0', '#aeb9c9'];
  if (weather === 'storm') return ['#39415a', '#5d6781'];
  if (weather === 'water') return ['#1c83a6', '#0b2f47'];
  if (weather === 'underground') return ['#241a12', '#0c0805'];
  return [COLORS.skyTop, COLORS.skyBot];
}
function shade(hex, f) {
  const n = parseInt(hex.slice(1), 16);
  const r = Math.round(((n >> 16) & 255) * f);
  const g = Math.round(((n >> 8) & 255) * f);
  const b = Math.round((n & 255) * f);
  return `rgb(${r},${g},${b})`;
}
function levelWeather() {
  return (LEVELS[currentLevel] && LEVELS[currentLevel].weather)
    || ['sun', 'rain', 'storm'][currentLevel] || 'sun';
}

function drawBackground() {
  skyTick++;
  const weather = levelWeather();
  const [top, bot] = skyColors(weather);
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, top); g.addColorStop(1, bot);
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);

  // Fondo subterráneo: cueva oscura con ladrillos tenues
  if (weather === 'underground') { drawCaveBg(); return; }

  // Fondo submarino: rayos de luz y nada más
  if (weather === 'water') { drawLightRays(); return; }

  // Sol animado (clima despejado)
  if (weather === 'sun') drawSun();

  // Nubes (parallax) — color según el clima
  ctx.fillStyle = weather === 'storm' ? 'rgba(120,128,148,0.92)'
                : weather === 'rain'  ? 'rgba(188,196,210,0.9)'
                : 'rgba(255,255,255,0.85)';
  const clouds = [[200,60],[600,90],[1000,50],[1500,80],[2100,60],[2700,90],[3200,55]];
  for (const [cx, cy] of clouds) cloud(cx - camX * 0.3, cy);

  // Colinas (más oscuras con mal clima)
  const dim = weather === 'storm' ? 0.55 : weather === 'rain' ? 0.8 : 1;
  ctx.fillStyle = shade(COLORS.hillFar, dim);
  for (let i = -1; i < 8; i++) hill(i*520 - (camX*0.4 % 520), 300, 260, 120);
  ctx.fillStyle = shade(COLORS.hillNear, dim);
  for (let i = -1; i < 10; i++) hill(i*420 - (camX*0.6 % 420), 330, 200, 90);

  // Lluvia y relámpagos
  if (weather === 'rain')  drawRain(70, false);
  if (weather === 'storm') { drawRain(120, true); drawLightning(); }
}

function drawCaveBg() {
  // ladrillos de fondo tenues con leve parallax
  const t = 36;
  const off = (camX * 0.3) % t;
  ctx.strokeStyle = 'rgba(255,255,255,0.05)';
  ctx.lineWidth = 1;
  for (let y = 0; y < H; y += t) {
    const shift = (Math.floor(y / t) % 2) ? t / 2 : 0;
    for (let x = -t; x < W + t; x += t) {
      ctx.strokeRect(Math.round(x - off + shift), y, t, t);
    }
  }
  // vetas/manchas de tierra
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  for (let i = 0; i < 6; i++) {
    const bx = ((i * 230 - camX * 0.25) % (W + 120) + (W + 120)) % (W + 120) - 60;
    ctx.beginPath(); ctx.ellipse(bx, 70 + (i * 47) % (H - 120), 60, 24, 0, 0, 6.28); ctx.fill();
  }
}

function drawSun() {
  const cx = W * 0.8, cy = 64, r = 26, t = skyTick;
  const pulse = 1 + Math.sin(t * 0.05) * 0.06;
  // resplandor
  ctx.save();
  ctx.globalAlpha = 0.22;
  ctx.fillStyle = '#fff2a8';
  ctx.beginPath(); ctx.arc(cx, cy, r * 2.2 * pulse, 0, 7); ctx.fill();
  ctx.restore();
  // rayos giratorios
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(t * 0.01);
  ctx.strokeStyle = '#ffd24d'; ctx.lineWidth = 4;
  for (let i = 0; i < 12; i++) {
    const a = (i / 12) * Math.PI * 2;
    const r1 = r + 6, r2 = r + 16 + (i % 2) * 4;
    ctx.beginPath();
    ctx.moveTo(Math.cos(a) * r1, Math.sin(a) * r1);
    ctx.lineTo(Math.cos(a) * r2, Math.sin(a) * r2);
    ctx.stroke();
  }
  ctx.restore();
  // cuerpo + carita
  ctx.fillStyle = '#ffd24d';
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, 7); ctx.fill();
  ctx.fillStyle = '#ffe680';
  ctx.beginPath(); ctx.arc(cx - 6, cy - 6, r * 0.45, 0, 7); ctx.fill();
  ctx.fillStyle = '#c98a1e';
  ctx.fillRect(cx - 9, cy - 4, 4, 5); ctx.fillRect(cx + 5, cy - 4, 4, 5);
  ctx.strokeStyle = '#c98a1e'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(cx, cy + 3, 7, 0.15 * Math.PI, 0.85 * Math.PI); ctx.stroke();
}

function drawRain(count, storm) {
  if (raindrops.length !== count) {
    raindrops = [];
    for (let i = 0; i < count; i++) raindrops.push({
      x: Math.random() * W, y: Math.random() * H,
      len: 8 + Math.random() * 10, sp: 6 + Math.random() * 6
    });
  }
  const wind = storm ? 3 : 1.5;
  ctx.strokeStyle = storm ? 'rgba(185,205,235,0.7)' : 'rgba(205,218,240,0.6)';
  ctx.lineWidth = storm ? 2 : 1.5;
  ctx.beginPath();
  for (const d of raindrops) {
    d.y += d.sp; d.x += wind;
    if (d.y > H) { d.y = -d.len; d.x = Math.random() * W; }
    if (d.x > W) d.x -= W;
    ctx.moveTo(d.x, d.y);
    ctx.lineTo(d.x - wind * 1.5, d.y + d.len);
  }
  ctx.stroke();
}

function drawLightning() {
  if (lightning > 0) {
    lightning--;
    ctx.save();
    ctx.globalAlpha = (lightning / 8) * 0.5;
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, W, H);
    ctx.restore();
  } else if (Math.random() < 0.006) {
    lightning = 8;
  }
}

let bubbles = [];
function drawLightRays() {
  ctx.save();
  ctx.globalAlpha = 0.10;
  ctx.fillStyle = '#cdeeff';
  for (let i = 0; i < 4; i++) {
    const x = (i * 190 + (skyTick * 0.3 % 190)) - 70;
    ctx.beginPath();
    ctx.moveTo(x, 0); ctx.lineTo(x + 44, 0); ctx.lineTo(x + 130, H); ctx.lineTo(x + 64, H);
    ctx.closePath(); ctx.fill();
  }
  ctx.restore();
}
function drawWaterOverlay() {
  // tinte azul muy suave
  ctx.save();
  ctx.globalAlpha = 0.10;
  ctx.fillStyle = '#1f9fd0';
  ctx.fillRect(0, 0, W, H);
  ctx.restore();
  // burbujas que suben
  if (bubbles.length === 0) {
    for (let i = 0; i < 42; i++) bubbles.push({
      x: Math.random() * W, y: Math.random() * H,
      r: 1 + Math.random() * 3, sp: 0.4 + Math.random() * 1.3
    });
  }
  ctx.fillStyle = 'rgba(255,255,255,0.45)';
  for (const b of bubbles) {
    b.y -= b.sp; b.x += Math.sin((skyTick + b.y) * 0.05) * 0.3;
    if (b.y < -4) { b.y = H + 4; b.x = Math.random() * W; }
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, 7); ctx.fill();
  }
}
function cloud(x, y) {
  ctx.beginPath();
  ctx.arc(x, y, 18, 0, 7); ctx.arc(x+22, y+4, 22, 0, 7);
  ctx.arc(x+48, y, 16, 0, 7); ctx.rect(x-2, y, 52, 18);
  ctx.fill();
}
function hill(x, baseY, w, h) {
  ctx.beginPath();
  ctx.moveTo(x, baseY);
  ctx.quadraticCurveTo(x + w/2, baseY - h, x + w, baseY);
  ctx.fill();
}

function drawPlatforms() {
  for (const plat of platforms) {
    if (plat.hidden || plat.broken) continue;
    const x = plat.x - camX;
    if (x + plat.w < -20 || x > W + 20) continue;
    if (plat.brick) {
      ctx.fillStyle = '#8a4521'; ctx.fillRect(x, plat.y, plat.w, plat.h);
      ctx.fillStyle = '#b5651d'; ctx.fillRect(x + 1, plat.y + 1, plat.w - 2, plat.h - 2);
      // juntas de mortero
      ctx.fillStyle = 'rgba(0,0,0,0.22)';
      ctx.fillRect(x, plat.y + plat.h / 2 - 1, plat.w, 2);
      ctx.fillRect(x + plat.w / 2 - 1, plat.y, 2, plat.h / 2);
      ctx.fillRect(x + plat.w / 4 - 1, plat.y + plat.h / 2, 2, plat.h / 2);
      ctx.fillRect(x + 3 * plat.w / 4 - 1, plat.y + plat.h / 2, 2, plat.h / 2);
      continue;
    }
    if (plat.block) {
      if (plat.bump > 0) plat.bump -= 1;
      const by = plat.y - (plat.bump || 0);
      if (!plat.used) {
        ctx.fillStyle = '#d98a1f'; ctx.fillRect(x, by, plat.w, plat.h);
        ctx.fillStyle = '#f5b341'; ctx.fillRect(x + 2, by + 2, plat.w - 4, plat.h - 4);
        ctx.fillStyle = '#9c5a10';
        ctx.fillRect(x + 3, by + 3, 3, 3); ctx.fillRect(x + plat.w - 6, by + 3, 3, 3);
        ctx.fillRect(x + 3, by + plat.h - 6, 3, 3); ctx.fillRect(x + plat.w - 6, by + plat.h - 6, 3, 3);
        ctx.fillStyle = '#7a3e00';
        ctx.font = 'bold 20px system-ui, -apple-system, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('?', x + plat.w / 2, by + plat.h / 2 + 7);
        ctx.textAlign = 'left';
      } else {
        ctx.fillStyle = '#6a4a2a'; ctx.fillRect(x, by, plat.w, plat.h);
        ctx.fillStyle = '#83603a'; ctx.fillRect(x + 2, by + 2, plat.w - 4, plat.h - 4);
        ctx.fillStyle = '#4f351c';
        ctx.fillRect(x + 3, by + 3, 3, 3); ctx.fillRect(x + plat.w - 6, by + 3, 3, 3);
        ctx.fillRect(x + 3, by + plat.h - 6, 3, 3); ctx.fillRect(x + plat.w - 6, by + plat.h - 6, 3, 3);
      }
      continue;
    }
    if (plat.pipe) {
      // tubo verde estilo Mario (boca arriba)
      ctx.fillStyle = '#1f7a36'; ctx.fillRect(x + 4, plat.y + 12, plat.w - 8, plat.h - 12);
      ctx.fillStyle = '#2e9e4a'; ctx.fillRect(x + 6, plat.y + 12, plat.w - 12, plat.h - 12);
      ctx.fillStyle = '#3fcf63'; ctx.fillRect(x + 8, plat.y + 12, 5, plat.h - 12);
      // boca (rim)
      ctx.fillStyle = '#1f7a36'; ctx.fillRect(x - 2, plat.y, plat.w + 4, 13);
      ctx.fillStyle = '#2e9e4a'; ctx.fillRect(x, plat.y + 2, plat.w, 8);
      ctx.fillStyle = '#3fcf63'; ctx.fillRect(x + 3, plat.y + 3, plat.w - 6, 3);
      ctx.fillStyle = '#175c28'; ctx.fillRect(x + 4, plat.y + 11, plat.w - 8, 2);
      continue;
    }
    if (plat.move) {
      // plataforma móvil: tono anaranjado con borde, para que se note
      ctx.fillStyle = '#b5651d';
      ctx.fillRect(x, plat.y, plat.w, plat.h);
      ctx.fillStyle = '#f0992e';
      ctx.fillRect(x, plat.y, plat.w, plat.h - 5);
      ctx.fillStyle = 'rgba(255,255,255,0.25)';
      ctx.fillRect(x, plat.y, plat.w, 3);
      ctx.fillStyle = 'rgba(0,0,0,0.18)';
      for (let i = 8; i < plat.w; i += 18) ctx.fillRect(x + i, plat.y + 6, 4, 4);
      continue;
    }
    if (plat.h >= 32) {
      // suelo: tierra + césped
      ctx.fillStyle = COLORS.ground;
      ctx.fillRect(x, plat.y, plat.w, plat.h + 40);
      ctx.fillStyle = COLORS.groundTop;
      ctx.fillRect(x, plat.y, plat.w, 10);
      // textura puntitos
      ctx.fillStyle = 'rgba(0,0,0,0.08)';
      for (let i = 6; i < plat.w; i += 24)
        ctx.fillRect(x + i, plat.y + 18, 4, 4);
    } else {
      // repisa sólida de tierra con césped (NO es un ladrillo rompible)
      ctx.fillStyle = COLORS.ground;
      ctx.fillRect(x, plat.y, plat.w, plat.h);
      ctx.fillStyle = COLORS.groundTop;
      ctx.fillRect(x, plat.y, plat.w, 6);
      ctx.fillStyle = 'rgba(255,255,255,0.10)';
      ctx.fillRect(x, plat.y, plat.w, 2);
      ctx.fillStyle = 'rgba(0,0,0,0.10)';
      for (let i = 6; i < plat.w; i += 22) ctx.fillRect(x + i, plat.y + plat.h - 6, 3, 3);
    }
  }
}

function drawCoins() {
  for (const c of coins) {
    if (c.got) continue;
    const x = c.x - camX;
    if (x < -20 || x > W + 20) continue;
    const wobble = Math.abs(Math.cos(c.bob)) * c.r + 2;
    const y = c.y;
    ctx.fillStyle = COLORS.coin;
    ctx.beginPath();
    ctx.ellipse(x, y, wobble, c.r, 0, 0, 7);
    ctx.fill();
    ctx.fillStyle = '#ffe680';
    ctx.beginPath();
    ctx.ellipse(x - wobble*0.25, y - 2, wobble*0.35, c.r*0.5, 0, 0, 7);
    ctx.fill();
  }
}

function drawEnemies() {
  for (const e of enemies) {
    const x = e.x - camX;
    if (x < -40 || x > W + 40) continue;
    if (e.dead && e.squish <= 0) continue;
    const sq = e.dead ? e.squish : 1;
    const h = e.h * sq;
    const y = e.y + (e.h - h);

    let col = COLORS.enemy, dark = COLORS.enemyDark;
    if (e.type === 'flyer')  { col = '#33b9a6'; dark = '#1f7e72'; }
    else if (e.type === 'hopper') { col = '#62bd42'; dark = '#458a2c'; }
    else if (e.type === 'spiky')  { col = '#e6692e'; dark = '#b84e1c'; }
    // destello al resistir un pisotón
    if (e.hurt > 0 && Math.floor(e.hurt / 3) % 2 === 0) { col = '#ffffff'; dark = '#d0d0d0'; }

    // Alas del volador (detrás del cuerpo, aleteando)
    if (e.type === 'flyer' && !e.dead) {
      const flap = Math.sin(tick * 0.4) * 6;
      ctx.fillStyle = dark;
      ctx.beginPath(); ctx.moveTo(x, y + 8); ctx.lineTo(x - 12, y + 2 + flap); ctx.lineTo(x - 2, y + 16); ctx.closePath(); ctx.fill();
      ctx.beginPath(); ctx.moveTo(x + e.w, y + 8); ctx.lineTo(x + e.w + 12, y + 2 + flap); ctx.lineTo(x + e.w + 2, y + 16); ctx.closePath(); ctx.fill();
    }
    // Púas del erizo (arriba, blancas) — aviso de "no me pises"
    if (e.type === 'spiky' && !e.dead) {
      ctx.fillStyle = '#fff';
      for (let i = 0; i < 4; i++) {
        const sx = x + 3 + i * ((e.w - 6) / 3);
        ctx.beginPath(); ctx.moveTo(sx, y); ctx.lineTo(sx + 5, y); ctx.lineTo(sx + 2.5, y - 7); ctx.closePath(); ctx.fill();
      }
    }

    // Cuerpo
    ctx.fillStyle = dark; ctx.fillRect(x, y+3, e.w, h-3);
    ctx.fillStyle = col;  ctx.fillRect(x, y, e.w, h-4);
    if (!e.dead) {
      // ojos (enojados si es de púas)
      ctx.fillStyle = '#fff';
      ctx.fillRect(x+5, y+6, 6, 6);
      ctx.fillRect(x+e.w-11, y+6, 6, 6);
      ctx.fillStyle = '#222';
      const look = e.dir < 0 ? 0 : 3;
      ctx.fillRect(x+6+look, y+8, 3, 3);
      ctx.fillRect(x+e.w-10+look, y+8, 3, 3);
      // pies (no para volador)
      if (e.type !== 'flyer') {
        ctx.fillStyle = dark;
        const f = Math.sin(Date.now()/120) > 0 ? 0 : 4;
        ctx.fillRect(x+2, e.y+e.h-3, 8, 4);
        ctx.fillRect(x+e.w-10, e.y+e.h-3, 8, 4);
      }
    }
  }
}

// ---------- Sprite del personaje (bebé digitalizada) ----------
const babyCv = document.createElement('canvas');
babyCv.width = 48; babyCv.height = 56;
const bx = babyCv.getContext('2d');
const BC = {
  hair:'#241712', hair2:'#3a2419', skin:'#e0a878', skin2:'#ca915f',
  blush:'#ef9aa0', eye:'#241008', white:'#ffffff', mouth:'#9c3b3b',
  tongue:'#e07a86', dress:'#f49ac2', dress2:'#e279ab', ruffle:'#ffc6de',
  gold:'#f5c542', xeye:'#7a3a3a'
};
function bpx(x, y, w, h, color) { bx.fillStyle = color; bx.fillRect(x, y, w, h); }

function drawBabySprite(bob, blink, pose, walkPhase) {
  bx.clearRect(0, 0, 48, 56);
  const cx = 24;

function drawPlayer() {
  const p = player;
  const x = Math.round(p.x - camX);
  babyTick++;

  // Aura de invencibilidad (estrella)
  if (!p.dead && p.invincible > 0) {
    const hue = (tick * 9) % 360;
    const blink = p.invincible < 120 && (tick % 8 < 4); // parpadea al acabarse
    ctx.save();
    ctx.globalAlpha = blink ? 0.25 : 0.55;
    ctx.fillStyle = `hsl(${hue}, 90%, 60%)`;
    ctx.beginPath();
    ctx.ellipse(x + p.w/2, p.y + p.h/2, p.w*0.95, p.h*0.7, 0, 0, 7);
    ctx.fill();
    ctx.restore();
  }

  // sombra
  if (!p.dead) {
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.beginPath();
    ctx.ellipse(x + p.w/2, p.y + p.h + 4, p.w/2, 4, 0, 0, 7);
    ctx.fill();
  }

  // Elegir pose y animación
  let pose = 'idle', bob = 0, blink = false;
  if (p.dead) {
    pose = 'dead';
  } else if (!p.onGround) {
    pose = 'jump'; bob = -2;
  } else if (Math.abs(p.vx) > 0.5) {
    pose = 'walk'; bob = Math.abs(Math.sin(p.walk));
  } else {
    pose = 'idle';
    bob = Math.sin(babyTick * 0.06);
    blink = (babyTick % 160) < 8;
  }

  const useGirl = selectedChar === 1;
  const usePablo = selectedChar === 2;
  if (usePablo) drawPabloSprite(Math.round(bob), blink, pose, p.walk);
  else if (useGirl) drawGirlSprite(Math.round(bob), blink, pose, p.walk);
  else drawBabySprite(Math.round(bob), blink, pose, p.walk);
  const spr = usePablo ? pabloCv : (useGirl ? girlCv : babyCv);

  // Dibujar el sprite escalado, pies alineados al suelo, volteado según dirección
  const dw = 40, dh = 46;
  const dx = Math.round(x + p.w/2 - dw/2);
  const dy = Math.round(p.y + p.h - 45);

  ctx.save();
  ctx.imageSmoothingEnabled = false;
  ctx.webkitImageSmoothingEnabled = false;
  if (p.face < 0) {
    ctx.translate(dx + dw, dy);
    ctx.scale(-1, 1);
    ctx.drawImage(spr, 0, 0, 48, 56, 0, 0, dw, dh);
  } else {
    ctx.drawImage(spr, 0, 0, 48, 56, dx, dy, dw, dh);
  }
  ctx.restore();
}

function drawBoss() {
  if (!boss || !boss.alive) return;
  const b = boss;
  const x = Math.round(b.x - camX);
  if (x + b.w < -80 || x > W + 80) return;
  // sombra
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.beginPath();
  ctx.ellipse(x + b.w / 2, b.groundY - 2, b.w / 2, 6, 0, 0, 7);
  ctx.fill();
  // sprite (parpadea al recibir golpe)
  const flash = b.hitFlash > 0 && (b.hitFlash % 6 < 3);
  ctx.save();
  ctx.imageSmoothingEnabled = false;
  ctx.webkitImageSmoothingEnabled = false;
  if (flash) ctx.globalAlpha = 0.35;
  if (b.face < 0) {
    ctx.translate(x + b.w, b.y); ctx.scale(-1, 1);
    ctx.drawImage(bossCv, 0, 0, 64, 80, 0, 0, b.w, b.h);
  } else {
    ctx.drawImage(bossCv, 0, 0, 64, 80, x, b.y, b.w, b.h);
  }
  ctx.restore();
  ctx.globalAlpha = 1;
  // barra de vida
  const bw = b.w + 10, bx = x - 5, by = b.y - 14;
  ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(bx, by, bw, 7);
  ctx.fillStyle = '#ff4d6d'; ctx.fillRect(bx + 1, by + 1, (bw - 2) * (b.hp / b.maxHp), 5);
  // proyectiles
  for (const pr of b.projectiles) {
    const px = pr.x - camX;
    ctx.fillStyle = '#3a3a3a';
    ctx.beginPath(); ctx.arc(px, pr.y, pr.r, 0, 7); ctx.fill();
    ctx.fillStyle = '#5a5a5a';
    ctx.beginPath(); ctx.arc(px - 2, pr.y - 2, pr.r * 0.4, 0, 7); ctx.fill();
  }
}

function drawLevelIntro() {
  if (levelIntro <= 0) return;
  levelIntro--;
  const L = LEVELS[currentLevel];
  const isLast = currentLevel === LEVELS.length - 1;
  const main = 'NIVEL ' + (currentLevel + 1) + (isLast ? ' · ¡FINAL!' : '');
  const sub = L && L.name ? L.name : '';
  ctx.save();
  ctx.globalAlpha = Math.min(1, levelIntro / 30);
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.fillRect(0, H / 2 - 40, W, sub ? 86 : 68);
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center';
  ctx.font = 'bold 30px system-ui, -apple-system, sans-serif';
  ctx.fillText(main, W / 2, H / 2 + (sub ? -2 : 8));
  if (sub) {
    ctx.font = 'bold 18px system-ui, -apple-system, sans-serif';
    ctx.fillStyle = '#ffd24d';
    ctx.fillText(sub, W / 2, H / 2 + 26);
  }
  ctx.restore();
  ctx.textAlign = 'left';
}

function drawItems() {
  if (!items) return;
  for (const it of items) {
    if (it.got) continue;
    const x = it.x + it.w / 2 - camX;
    if (x < -30 || x > W + 30) continue;
    const y = it.y + it.h / 2 + (it.settled ? Math.sin(it.bob) * 2 : 0);
    if (it.type === 'star') {
      const r = it.w / 2 + 2;
      ctx.save(); ctx.globalAlpha = 0.4; ctx.fillStyle = '#fff3b0';
      ctx.beginPath(); ctx.arc(x, y, r * 1.5, 0, 7); ctx.fill(); ctx.restore();
      ctx.fillStyle = '#ffd24d'; ctx.strokeStyle = '#c9881e'; ctx.lineWidth = 2;
      ctx.beginPath();
      for (let i = 0; i < 10; i++) {
        const ang = -Math.PI / 2 + i * Math.PI / 5;
        const rr = (i % 2 === 0 ? r : r * 0.45);
        const px = x + Math.cos(ang) * rr, py = y + Math.sin(ang) * rr;
        i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.closePath(); ctx.fill(); ctx.stroke();
      ctx.fillStyle = '#5a3a00';
      ctx.fillRect(x - 4, y - 1, 2, 3); ctx.fillRect(x + 2, y - 1, 2, 3);
    } else {
      // biberón (más grande, vertical)
      ctx.save(); ctx.globalAlpha = 0.35; ctx.fillStyle = '#cfe2ff';
      ctx.beginPath(); ctx.arc(x, y, it.w * 0.9, 0, 7); ctx.fill(); ctx.restore();
      ctx.fillStyle = '#eef4ff'; ctx.fillRect(x - 7, y - 8, 14, 18);
      ctx.fillStyle = '#dfe9fb'; ctx.fillRect(x - 7, y - 8, 14, 4);
      ctx.fillStyle = '#e8c39a'; ctx.fillRect(x - 4, y - 13, 8, 5);
      ctx.fillStyle = '#9ec5ff'; ctx.fillRect(x - 7, y - 1, 7, 1); ctx.fillRect(x - 7, y + 4, 7, 1);
    }
  }
}

function drawBottles() {
  if (!bottles) return;
  for (const bo of bottles) {
    const x = bo.x - camX;
    if (x < -20 || x > W + 20) continue;
    ctx.save();
    ctx.translate(x, bo.y);
    ctx.rotate(bo.spin);
    // cuerpo del biberón
    ctx.fillStyle = '#eef4ff';
    ctx.fillRect(-5, -7, 10, 15);
    ctx.fillStyle = '#dfe9fb';
    ctx.fillRect(-5, -7, 10, 3);
    // tetina
    ctx.fillStyle = '#e8c39a';
    ctx.fillRect(-3, -11, 6, 4);
    ctx.fillStyle = '#d9ad82';
    ctx.fillRect(-2, -13, 4, 2);
    // marcas de medida
    ctx.fillStyle = '#9ec5ff';
    ctx.fillRect(-5, -1, 5, 1); ctx.fillRect(-5, 3, 5, 1);
    ctx.restore();
  }
}

function drawFlag() {
  const x = LEVEL_END - camX;
  if (x < -40 || x > W + 60) return;
  const baseY = 328;
  const top = 120 - flagRaise*60;
  // poste
  ctx.fillStyle = '#cfd8dc';
  ctx.fillRect(x, top, 6, baseY - top);
  ctx.fillStyle = '#ffd24d';
  ctx.beginPath(); ctx.arc(x+3, top, 7, 0, 7); ctx.fill();
  // bandera
  ctx.fillStyle = COLORS.flag;
  const fy = top + 6 + (1-flagRaise)*60;
  ctx.beginPath();
  ctx.moveTo(x+6, fy);
  ctx.lineTo(x+6, fy+34);
  ctx.lineTo(x-30, fy+17);
  ctx.fill();
}

function drawParticles() {
  for (const pt of particles) {
    ctx.globalAlpha = Math.min(1, pt.life/20);
    ctx.fillStyle = pt.color;
    ctx.fillRect(pt.x - camX, pt.y, pt.size, pt.size);
  }
  ctx.globalAlpha = 1;
}

// Tubo de entrada que cuelga del techo (nivel subterráneo)
function drawEntryPipe() {
  const L = LEVELS[currentLevel];
  if (!L || !L.pipeIn) return;
  const p = L.pipeIn;
  const x = p.x - camX;
  if (x + p.w < -20 || x > W + 20) return;
  const my = p.mouthY;
  // cuerpo desde el techo (y=0)
  ctx.fillStyle = '#1f7a36'; ctx.fillRect(x + 4, 0, p.w - 8, my - 12);
  ctx.fillStyle = '#2e9e4a'; ctx.fillRect(x + 6, 0, p.w - 12, my - 12);
  ctx.fillStyle = '#3fcf63'; ctx.fillRect(x + 8, 0, 5, my - 12);
  // boca (abajo)
  ctx.fillStyle = '#1f7a36'; ctx.fillRect(x - 2, my - 13, p.w + 4, 13);
  ctx.fillStyle = '#2e9e4a'; ctx.fillRect(x, my - 11, p.w, 8);
  ctx.fillStyle = '#103f1c'; ctx.fillRect(x + 3, my - 4, p.w - 6, 4); // sombra interior (boca)
}

function render() {
  const L = LEVELS[currentLevel];
  if (state === 'menu') { drawBackground(); animateCharPreview(); return; }
  if (mazeMode) { renderMaze(); return; }
  if (planeMode) { renderPlane(); return; }
  drawBackground();

  // Capa del mundo: se desplaza verticalmente con la cámara (camY)
  ctx.save();
  ctx.translate(0, -Math.round(camY));
  if (!boss && !(L && (L.vertical || L.water))) drawFlag();
  drawPlatforms();
  drawItems();
  drawCoins();
  drawEnemies();
  drawBoss();
  drawBottles();
  drawParticles();
  drawPlayer();
  drawEntryPipe();
  ctx.restore();

  // Overlay de agua (burbujas y tinte) en niveles de buceo
  if (L && L.water) drawWaterOverlay();

  drawLevelIntro();

  // Indicador de invencibilidad
  if (player && player.invincible > 0 && state === 'play') {
    const secs = Math.ceil(player.invincible / 60);
    ctx.save();
    ctx.font = 'bold 18px system-ui, -apple-system, sans-serif';
    ctx.textAlign = 'right';
    ctx.fillStyle = '#ffd24d';
    ctx.fillText('⭐ ' + secs + 's', W - 12, 26);
    ctx.restore();
    ctx.textAlign = 'left';
  }

  // Aviso de vida extra
  if (lifeMsg > 0) {
    lifeMsg--;
    ctx.save();
    ctx.globalAlpha = Math.min(1, lifeMsg / 30);
    ctx.font = 'bold 22px system-ui, -apple-system, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ff5d7a';
    ctx.fillText('❤ ¡Vida extra!', W / 2, 64);
    ctx.restore();
    ctx.textAlign = 'left';
  }

  if (state === 'win' && flagRaise < 1) flagRaise = Math.min(1, flagRaise + 0.02);
}

const deathSound = document.getElementById('deathSound');
// --- Audio robusto: Web Audio API (mejor en iOS) con respaldo HTML5 ---
let audioCtx = null;
let deathBuffer = null;
let activeSource = null;
const DEATH_SRC = deathSound ? deathSound.getAttribute('src') : null;

function b64ToArrayBuffer(dataUri) {
  const b64 = (dataUri.split(',')[1] || '');
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return bytes.buffer;
}
function initAudio() {
  if (audioCtx || !DEATH_SRC) return;
  try {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return;
    audioCtx = new AC();
    try {
      const arr = b64ToArrayBuffer(DEATH_SRC);
      audioCtx.decodeAudioData(arr,
        buf => { deathBuffer = buf; },
        () => {});
    } catch (e) {}
  } catch (e) {}
}

// Se llama DENTRO del gesto del usuario (botón Jugar) para desbloquear el audio en iOS
function unlockAudio() {
  initAudio();
  if (audioCtx) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    try {
      const b = audioCtx.createBuffer(1, 1, 22050);
      const s = audioCtx.createBufferSource();
      s.buffer = b; s.connect(audioCtx.destination); s.start(0);
    } catch (e) {}
  }
  // respaldo: desbloquear también el elemento <audio>
  if (deathSound) {
    const p = deathSound.play();
    if (p && p.then) p.then(() => { deathSound.pause(); deathSound.currentTime = 0; }).catch(() => {});
  }
}

function playDeathSound() {
  // Preferir Web Audio
  if (audioCtx && deathBuffer) {
    try {
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const s = audioCtx.createBufferSource();
      s.buffer = deathBuffer;
      s.connect(audioCtx.destination);
      s.start(0);
      activeSource = s;
      return;
    } catch (e) {}
  }
  // Respaldo HTML5
  if (deathSound) {
    try { deathSound.currentTime = 0; const p = deathSound.play(); if (p && p.catch) p.catch(() => {}); } catch (e) {}
  }
}

function stopDeathSound() {
  if (activeSource) { try { activeSource.stop(); } catch (e) {} activeSource = null; }
  if (deathSound) { try { deathSound.pause(); deathSound.currentTime = 0; } catch (e) {} }
}

// --- Efectos sintetizados (Web Audio) ---
function beep(freq, startOffset, dur, type, vol) {
  if (!audioCtx) return;
  try {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const t0 = audioCtx.currentTime + (startOffset || 0);
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = type || 'square';
    osc.frequency.setValueAtTime(freq, t0);
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(vol || 0.16, t0 + 0.012);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    osc.connect(g); g.connect(audioCtx.destination);
    osc.start(t0);
    osc.stop(t0 + dur + 0.02);
  } catch (e) {}
}
function coinSound() {
  // Dos notas ascendentes, tipo moneda
  beep(988, 0, 0.09, 'square', 0.22);     // B5
  beep(1319, 0.07, 0.20, 'square', 0.22); // E6
}
function startChime() {
  // Pequeño jingle al iniciar — también confirma que el audio está activo
  beep(659, 0, 0.10, 'square', 0.16);   // E5
  beep(880, 0.10, 0.16, 'square', 0.16); // A5
}
function stompSound() {
  if (!audioCtx) return;
  try {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const t0 = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(420, t0);
    osc.frequency.exponentialRampToValueAtTime(90, t0 + 0.15);
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(0.18, t0 + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.18);
    osc.connect(g); g.connect(audioCtx.destination);
    osc.start(t0); osc.stop(t0 + 0.2);
  } catch (e) {}
}

// Red de seguridad: desbloquear el audio en la primera interacción del usuario
function firstGestureUnlock() {
  unlockAudio();
  window.removeEventListener('touchstart', firstGestureUnlock);
  window.removeEventListener('pointerdown', firstGestureUnlock);
  window.removeEventListener('mousedown', firstGestureUnlock);
  window.removeEventListener('keydown', firstGestureUnlock);
}

window.addEventListener('pointerdown', firstGestureUnlock, {passive:true});
window.addEventListener('mousedown', firstGestureUnlock, {passive:true});

// ---------- Top de monedas (leaderboard) ----------
const LB_KEY = 'plataformas_leaderboard';
const NAME_KEY = 'plataformas_name';
let scores = [];
let currentPlayerName = '';

// 🌐 TOP GLOBAL COMPARTIDO (opcional).
// Pega aquí la URL que termina en /exec de tu Web App de Google Apps Script.
// Si lo dejas vacío, el top se guarda solo en este navegador (localStorage).
const SHEET_API = '';

function remoteEnabled() {
  return typeof SHEET_API === 'string' && SHEET_API.indexOf('http') === 0;
}
async function fetchRemoteScores() {
  const res = await fetch(SHEET_API, { method: 'GET' });
  const data = await res.json();
  if (data && data.ok && Array.isArray(data.scores)) {
    scores = data.scores.map(s => ({
      name: String(s.name), coins: Number(s.coins) || 0, t: Number(s.t) || 0
    }));
  }
}
async function postRemoteScore(name, coins) {
  // Content-Type text/plain evita el "preflight" CORS que Apps Script no maneja bien
  await fetch(SHEET_API, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({ name: name || 'Anónimo', coins: coins })
  });
}
// Guarda el puntaje (remoto si está configurado, si no local) y dibuja el top.
// Devuelve el índice del jugador en el top (o -1) para resaltar / detectar récord.
async function finishScore(coins) {
  const name = (currentPlayerName || '').trim().slice(0, 12) || 'Anónimo';
  if (remoteEnabled()) {
    const board = document.getElementById('endBoard');
    if (board) board.innerHTML =
      '<div class="board-title">🏆 Top monedas</div><div class="board-empty">Guardando…</div>';
    try {
      await postRemoteScore(name, coins);
      await fetchRemoteScores();
    } catch (e) {
      loadScores();
      recordScore(name, coins); // respaldo local si no hay internet
    }
    const idx = scores.findIndex(s => s.name === name && s.coins === coins);
    renderBoard('endBoard', idx);
    return idx;
  } else {
    const rank = recordScore(name, coins);
    renderBoard('endBoard', rank);
    return rank;
  }
}

function loadScores() {
  try {
    const raw = localStorage.getItem(LB_KEY);
    scores = raw ? JSON.parse(raw) : [];
  } catch (e) { scores = []; }
  if (!Array.isArray(scores)) scores = [];
}
function saveScores() {
  try { localStorage.setItem(LB_KEY, JSON.stringify(scores)); } catch (e) {}
}
function loadName() {
  try { return localStorage.getItem(NAME_KEY) || ''; } catch (e) { return ''; }
}
function saveName(n) {
  try { localStorage.setItem(NAME_KEY, n); } catch (e) {}
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function recordScore(name, coins) {
  name = (name || '').trim().slice(0, 12) || 'Anónimo';
  const entry = { name, coins, t: Date.now() };
  scores.push(entry);
  scores.sort((a, b) => (b.coins - a.coins) || (a.t - b.t));
  scores = scores.slice(0, 10);
  saveScores();
  return scores.indexOf(entry); // posición en el top, o -1 si no entró
}
function renderBoard(elId, highlightIdx) {
  const el = document.getElementById(elId);
  if (!el) return;
  if (scores.length === 0) {
    el.innerHTML = '<div class="board-title">🏆 Top monedas</div>' +
                   '<div class="board-empty">Aún no hay puntajes</div>';
    return;
  }
  let html = '<div class="board-title">🏆 Top monedas</div>';
  scores.slice(0, 5).forEach((s, i) => {
    const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : (i + 1) + '.';
    const me = (i === highlightIdx) ? ' me' : '';
    html += `<div class="board-row${me}"><span>${medal} ${escapeHtml(s.name)}</span><span>${s.coins}</span></div>`;
  });
  el.innerHTML = html;
}
